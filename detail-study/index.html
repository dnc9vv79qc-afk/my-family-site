<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>詳細検討スタジオ | MORI</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <b>詳細検討スタジオ</b>
        <span id="layoutMeta">読み込み中</span>
      </div>
      <div class="topActions">
        <button class="ghostBtn" id="reloadBtn" type="button">再読込</button>
        <button class="ghostBtn" id="exportBtn" type="button">書出</button>
        <button class="primaryBtn" id="saveBtn" type="button">保存</button>
      </div>
    </header>

    <main class="workspace">
      <section class="stageArea">
        <div class="stageToolbar">
          <div class="segmented" id="viewTabs" aria-label="表示切替">
            <button type="button" data-view="3d" class="on">3D</button>
            <button type="button" data-view="plan">平面</button>
            <button type="button" data-view="list">一覧</button>
          </div>
          <div class="segmented" id="floorTabs" aria-label="階切替">
            <button type="button" data-floor="0" class="on">1F</button>
            <button type="button" data-floor="1">2F</button>
            <button type="button" data-floor="all">全体</button>
          </div>
          <div class="metricStrip" id="metricStrip"></div>
        </div>

        <div class="stage stage3d" id="stage3d">
          <canvas id="sceneCanvas"></canvas>
          <div class="walkHud" id="walkHud">
            <button type="button" id="walkModeBtn">歩く</button>
            <button type="button" id="reset3dBtn">視点</button>
            <span id="walkStatus">俯瞰</span>
          </div>
          <div class="viewPresetBar" id="viewPresetBar">
            <button type="button" data-preset="exterior">外観</button>
            <button type="button" data-preset="top">俯瞰</button>
            <button type="button" data-preset="interior">内観</button>
          </div>
          <div class="roomWarp" id="roomWarp"></div>
          <div class="walkStick" id="walkStick"><div id="walkStickKnob"></div></div>
          <div class="viewBadge" id="viewBadge">3D</div>
        </div>

        <div class="stage stagePlan" id="stagePlan" hidden>
          <svg id="planSvg" role="img" aria-label="間取り平面図"></svg>
          <div class="planHud" id="planHud">
            <span id="planHudTitle">平面編集</span>
            <div class="hudTools">
              <button type="button" id="centerPlanBtn">全体</button>
              <button type="button" id="clearSelectionBtn">解除</button>
            </div>
          </div>
        </div>

        <div class="stage stageList" id="stageList" hidden>
          <div class="listColumns">
            <section>
              <h2>検討パーツ</h2>
              <div id="itemListLarge" class="denseList"></div>
            </section>
            <section>
              <h2>メモ</h2>
              <div id="noteListLarge" class="denseList"></div>
            </section>
          </div>
        </div>
      </section>

      <aside class="inspector">
        <section class="panelBlock layerBlock">
          <div class="blockTitle">表示切替</div>
          <div class="toggleGrid" id="layerToggles">
            <label><input type="checkbox" data-layer="rooms" checked>部屋色</label>
            <label><input type="checkbox" data-layer="walls" checked>壁</label>
            <label><input type="checkbox" data-layer="openings" checked>窓/建具</label>
            <label><input type="checkbox" data-layer="furniture" checked>家具</label>
            <label><input type="checkbox" data-layer="shelves" checked>棚</label>
            <label><input type="checkbox" data-layer="exterior" checked>外構</label>
          </div>
        </section>

        <section class="panelBlock focusBlock addBlock">
          <div class="blockTitle">敷地・外構</div>
          <div class="palette groupedPalette" id="exteriorPalette"></div>
        </section>

        <section class="panelBlock siteConditionBlock">
          <div class="blockTitle">敷地条件</div>
          <div class="distanceGrid">
            <label>北m<input id="siteNorthInput" type="number" min="0" max="15" step="0.1"></label>
            <label>東m<input id="siteEastInput" type="number" min="0" max="15" step="0.1"></label>
            <label>南m<input id="siteSouthInput" type="number" min="0" max="15" step="0.1"></label>
            <label>西m<input id="siteWestInput" type="number" min="0" max="15" step="0.1"></label>
          </div>
          <button class="wideAction" id="applySiteBtn" type="button">敷地反映</button>
          <div class="formGrid">
            <label>敷地余白m<input id="setbackInput" type="number" min="0.5" max="8" step="0.1"></label>
            <label>初期駐車<input id="parkingInput" type="number" min="0" max="4" step="1"></label>
            <label>初期デッキm<input id="deckInput" type="number" min="0" max="5" step="0.1"></label>
            <label>方位°<input id="northInput" type="number" min="0" max="359" step="15"></label>
          </div>
          <label class="checkLine"><input id="fenceInput" type="checkbox">フェンス</label>
        </section>

        <section class="panelBlock addBlock">
          <div class="blockTitle">家具・棚・窓</div>
          <div class="palette groupedPalette" id="palette"></div>
        </section>

        <section class="panelBlock selectedBlock">
          <div class="blockTitle">選択</div>
          <div id="selectedPanel" class="selectedPanel"></div>
        </section>

        <section class="panelBlock">
          <div class="blockTitle">メモ</div>
          <div class="noteComposer">
            <select id="noteCategory">
              <option>外構</option>
              <option>家具</option>
              <option>棚</option>
              <option>窓</option>
              <option>内装</option>
            </select>
            <input id="noteInput" type="text" maxlength="80" placeholder="検討メモ">
            <button id="addNoteBtn" type="button">追加</button>
          </div>
          <div id="noteList" class="miniList"></div>
        </section>
      </aside>
    </main>
    <nav class="modeDock" id="modeDock" aria-label="操作">
      <button type="button" data-dock="select" class="on"><span>▸</span><b>選択</b></button>
      <button type="button" data-dock="add"><span>＋</span><b>追加</b></button>
      <button type="button" data-dock="measure"><span>⌁</span><b>計測</b></button>
      <button type="button" data-dock="browse"><span>☝</span><b>閲覧</b></button>
      <button type="button" data-dock="3d"><span>□</span><b>3D</b></button>
      <button type="button" data-dock="more"><span>…</span><b>他</b></button>
    </nav>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
