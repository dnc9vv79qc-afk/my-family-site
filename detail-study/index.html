<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>詳細検討スタジオ 06/18 階段壁修正v4 | MORI</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <b>詳細検討スタジオ <small>06/18 階段壁修正 v4</small></b>
        <span id="layoutMeta">読み込み中</span>
      </div>
      <div class="topActions">
        <button class="ghostBtn" id="reloadBtn" type="button">再読込</button>
        <button class="ghostBtn" id="exportBtn" type="button">書出</button>
        <button class="primaryBtn" id="saveBtn" type="button">保存</button>
      </div>
    </header>

    <main class="workspace">
      <section class="stageArea">
        <div class="stageToolbar">
          <div class="segmented" id="viewTabs" aria-label="表示切替">
            <button type="button" data-view="3d" class="on">3D</button>
            <button type="button" data-view="plan">平面</button>
            <button type="button" data-view="list">一覧</button>
          </div>
          <div class="segmented" id="floorTabs" aria-label="階切替">
            <button type="button" data-floor="0" class="on">1F</button>
            <button type="button" data-floor="1">2F</button>
            <button type="button" data-floor="all">全体</button>
          </div>
          <div class="metricStrip" id="metricStrip"></div>
        </div>

        <div class="stage stage3d" id="stage3d">
          <canvas id="sceneCanvas"></canvas>
          <div class="walkHud" id="walkHud">
            <button type="button" id="walkModeBtn">歩く</button>
            <button type="button" id="reset3dBtn">視点</button>
            <span id="walkStatus">俯瞰</span>
          </div>
          <div class="viewPresetBar" id="viewPresetBar">
            <button type="button" data-preset="exterior">外観</button>
            <button type="button" data-preset="top">俯瞰</button>
            <button type="button" data-preset="interior">内観</button>
          </div>
          <div class="roomWarp" id="roomWarp"></div>
          <div class="walkStick" id="walkStick"><div id="walkStickKnob"></div></div>
          <div class="viewBadge" id="viewBadge">3D</div>
        </div>

        <div class="stage stagePlan" id="stagePlan" hidden>
          <svg id="planSvg" role="img" aria-label="間取り平面図"></svg>
          <div class="planHud" id="planHud">
            <span id="planHudTitle">図面操作</span>
            <div class="hudTools">
              <button type="button" id="centerPlanBtn">全体表示</button>
              <button type="button" id="clearSelectionBtn">選択解除</button>
              <button type="button" id="undoBtn" disabled>元に戻す</button>
            </div>
          </div>
          <div class="planNudge" id="planNudge"></div>
          <div class="measureHud" id="measureHud" hidden>
            <b>2点測定</b><span id="measureText">始点をタップ</span>
            <button type="button" id="clearMeasureBtn">クリア</button>
          </div>
        </div>

        <div class="stage stageList" id="stageList" hidden>
          <div class="listColumns">
            <section>
              <h2>検討パーツ</h2>
              <div id="itemListLarge" class="denseList"></div>
            </section>
            <section>
              <h2>メモ</h2>
              <div id="noteListLarge" class="denseList"></div>
            </section>
          </div>
        </div>
      </section>

      <aside class="inspector" id="inspector">
        <section class="panelBlock layerBlock">
          <div class="blockTitle">表示切替</div>
          <div class="toggleGrid" id="layerToggles">
            <label><input type="checkbox" data-layer="site" checked>敷地</label>
            <label><input type="checkbox" data-layer="rooms" checked>部屋色</label>
            <label><input type="checkbox" data-layer="walls" checked>壁</label>
            <label><input type="checkbox" data-layer="openings" checked>窓/建具</label>
            <label><input type="checkbox" data-layer="furniture" checked>家具</label>
            <label><input type="checkbox" data-layer="guideFurniture">元図家具</label>
            <label><input type="checkbox" data-layer="shelves" checked>棚</label>
            <label><input type="checkbox" data-layer="exterior" checked>外構</label>
          </div>
        </section>

        <section class="panelBlock focusBlock addBlock">
          <div class="blockTitle">敷地・外構</div>
          <div class="palette groupedPalette" id="exteriorPalette"></div>
        </section>

        <section class="panelBlock siteConditionBlock">
          <div class="blockTitle">敷地条件</div>
          <div class="siteSettingsTabs" id="siteSettingsTabs">
            <button type="button" class="on" data-site-tab="position">建物位置</button>
            <button type="button" data-site-tab="finish">外観</button>
            <button type="button" data-site-tab="auto">初期配置</button>
          </div>
          <div class="siteSettingsPanel" data-site-panel="position">
            <div class="distanceGrid">
              <label>北m<input id="siteNorthInput" type="number" min="0" max="15" step="0.1"></label>
              <label>東m<input id="siteEastInput" type="number" min="0" max="15" step="0.1"></label>
              <label>南m<input id="siteSouthInput" type="number" min="0" max="15" step="0.1"></label>
              <label>西m<input id="siteWestInput" type="number" min="0" max="15" step="0.1"></label>
            </div>
            <div class="siteEqualRow">
              <label>四辺一括m<input id="siteEqualInput" type="number" min="0" max="15" step="0.1" value="2"></label>
              <button id="siteEqualBtn" type="button">四辺を揃える</button>
            </div>
            <button class="wideAction" id="applySiteBtn" type="button">建物位置を反映</button>
          </div>
          <div class="siteSettingsPanel" data-site-panel="finish" hidden>
            <div class="formGrid">
              <label>方位°<input id="northInput" type="number" min="0" max="359" step="15"></label>
              <label>外壁<input id="wallColorInput" type="color"></label>
              <label>ポーチタイル<input id="porchTileInput" type="color"></label>
            </div>
            <label class="checkLine"><input id="fenceInput" type="checkbox">フェンスを表示</label>
          </div>
          <div class="siteSettingsPanel" data-site-panel="auto" hidden>
            <div class="formGrid">
              <label>敷地余白m<input id="setbackInput" type="number" min="0.5" max="8" step="0.1"></label>
              <label>駐車台数<input id="parkingInput" type="number" min="0" max="4" step="1"></label>
              <label>デッキ奥行m<input id="deckInput" type="number" min="0" max="5" step="0.1"></label>
            </div>
          </div>
        </section>

        <section class="panelBlock addBlock">
          <div class="blockTitle">家具・棚・窓</div>
          <button class="wideAction objectBuilderOpen" id="openObjectBuilderBtn" type="button">3D部品を作る</button>
          <div class="palette groupedPalette" id="palette"></div>
        </section>

        <section class="panelBlock selectedBlock">
          <div class="blockTitle">選択</div>
          <div id="selectedPanel" class="selectedPanel"></div>
        </section>

        <section class="panelBlock noteBlock">
          <div class="blockTitle">メモ</div>
          <div class="noteComposer">
            <select id="noteCategory">
              <option>外構</option>
              <option>家具</option>
              <option>棚</option>
              <option>窓</option>
              <option>内装</option>
            </select>
            <input id="noteInput" type="text" maxlength="80" placeholder="検討メモ">
            <button id="addNoteBtn" type="button">追加</button>
          </div>
          <div id="noteList" class="miniList"></div>
        </section>
      </aside>
    </main>
    <nav class="modeDock" id="modeDock" aria-label="操作">
      <button type="button" data-dock="select" class="on"><span>▸</span><b>選択</b></button>
      <button type="button" data-dock="add"><span>＋</span><b>追加</b></button>
      <button type="button" data-dock="measure"><span>⌁</span><b>計測</b></button>
      <button type="button" data-dock="browse"><span>☝</span><b>閲覧</b></button>
      <button type="button" data-dock="3d"><span>□</span><b>3D</b></button>
      <button type="button" data-dock="more"><span>…</span><b>他</b></button>
    </nav>
  </div>

  <section class="objectBuilder" id="objectBuilder" hidden>
    <div class="builderTop">
      <button type="button" id="builderCloseBtn">戻る</button>
      <div>
        <b>3D部品作成</b>
        <span>箱・円柱・球を組み合わせて保存</span>
      </div>
      <button type="button" id="builderSaveBtn">保存</button>
    </div>
    <div class="builderCanvasWrap">
      <canvas id="builderPreview" aria-label="作成中部品の3Dプレビュー"></canvas>
      <div class="builderViewModes" aria-label="3D編集モード">
        <button type="button" class="on" data-builder-mode="orbit">視点</button>
        <button type="button" data-builder-mode="move">移動</button>
        <button type="button" data-builder-mode="scale">サイズ</button>
        <button type="button" data-builder-mode="rotate">回転</button>
      </div>
      <button class="builderFitBtn" id="builderFitBtn" type="button" aria-label="全体を表示">全体</button>
      <div class="builderReadout">
        <b id="builderReadout">視点</b>
        <span id="builderSizeText"></span>
      </div>
      <label class="builderSnap">単位
        <select id="builderSnapInput">
          <option value="10">10mm</option>
          <option value="50" selected>50mm</option>
          <option value="100">100mm</option>
        </select>
      </label>
    </div>
    <div class="builderTools">
      <div class="builderMeta">
        <input id="builderNameInput" type="text" maxlength="18" value="作成部品">
        <select id="builderLayerInput">
          <option value="exterior">外構に置く</option>
          <option value="furniture">室内に置く</option>
        </select>
      </div>
      <div class="builderOverallSize">
        <label>全体幅mm<input id="builderOverallW" type="number" min="50" max="6000" step="10"></label>
        <label>全体奥行mm<input id="builderOverallD" type="number" min="50" max="6000" step="10"></label>
        <label>全体高さmm<input id="builderOverallH" type="number" min="30" max="5000" step="10"></label>
        <label class="builderRatio"><input id="builderKeepRatio" type="checkbox" checked>比率を保つ</label>
      </div>
      <div class="builderShapeButtons">
        <button type="button" data-builder-add="box">四角</button>
        <button type="button" data-builder-add="cylinder">丸柱</button>
        <button type="button" data-builder-add="sphere">球</button>
      </div>
      <div class="builderPartList" id="builderPartList"></div>
      <div class="builderEditor" id="builderEditor"></div>
    </div>
  </section>

  <div class="toast" id="toast" aria-live="polite"></div>
  <script type="module" src="./js/app.js?v=20260618-stair-wall-v4"></script>
</body>
</html>
